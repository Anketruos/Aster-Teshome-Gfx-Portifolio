<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact — Portfolio</title>
  <link rel="icon" type="image/webp" href="../images/Favicon.webp" />
  <link rel="apple-touch-icon" href="../images/Favicon.webp" />
  <link rel="stylesheet" href="../style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
</head>
<body>

  <div class="cursor-dot" id="cursorDot"></div>
  <div class="cursor-ring" id="cursorRing"></div>

  <nav class="nav" id="mainNav">
    <a href="../index.html" class="nav-logo">✦ Portfolio</a>
    <div class="nav-links">
      <a href="../index.html">Work</a>
      <a href="about.html">About</a>
      <a href="contact.html" class="active-link">Contact</a>
    </div>
  </nav>

  <section class="contact-page">
    <div class="contact-page-inner">
      <a href="../index.html" class="back-btn">← Back to work</a>

      <div class="contact-split">
        <div class="contact-left">
          <div class="section-label">— Get In Touch</div>
          <h1 class="contact-big-title">Let's create<br />something <span class="accent">bold.</span></h1>
          <p class="contact-para">Have a project in mind? Want to collaborate? Or just want to say hi? I'd love to hear from you.</p>

          <div class="contact-links">
            <a href="mailto:anketeshome@gmail.com" class="contact-link-item">
              <div class="cli-icon">✉</div>
              <div class="cli-text">
                <div class="cli-label">Email</div>
                <div class="cli-val">anketeshome@gmail.com</div>
              </div>
              <div class="cli-arrow">→</div>
            </a>
            <a href="tel:+251963290455" class="contact-link-item">
              <div class="cli-icon">✆</div>
              <div class="cli-text">
                <div class="cli-label">Phone</div>
                <div class="cli-val">+251 963 290 455</div>
              </div>
              <div class="cli-arrow">→</div>
            </a>
          </div>
        </div>

        <div class="contact-right">
          <form class="contact-form" id="contact-form">
            <div class="form-group">
              <label class="form-label">Your name</label>
              <input type="text" id="name" name="name" class="form-input" placeholder="e.g. Selam Tesfaye" required />
            </div>
            <div class="form-group">
              <label class="form-label">Your email</label>
              <input type="email" id="email" name="email" class="form-input" placeholder="you@example.com" required />
            </div>
            <div class="form-group">
              <label class="form-label">Message</label>
              <textarea id="message" name="message" class="form-input form-textarea" placeholder="Tell me about your project…" required></textarea>
            </div>
            <button type="submit" class="btn-primary btn-full">Send Message →</button>
          </form>
          <div id="formStatus" class="form-toast"></div>
        </div>
      </div>
    </div>
    <div class="contact-orb-1"></div>
    <div class="contact-orb-2"></div>
  </section>

  <footer class="footer">
    <span>✦ Portfolio — 2026</span>
    <span>Let's build something together.</span>
  </footer>

  <script src="../app.js"></script>
  <script>
    const form   = document.getElementById('contact-form');
    const status = document.getElementById('formStatus');

    form.addEventListener('submit', async function (e) {
      e.preventDefault();
      const submitBtn = form.querySelector('button[type="submit"]');
      submitBtn.textContent = 'Sending…';
      submitBtn.disabled = true;

      try {
        const response = await fetch('https://formspree.io/f/xpqelkwe', {
          method: 'POST',
          body: new FormData(form),
          headers: { Accept: 'application/json' }
        });

        if (response.ok) {
          showToast('✦ Message sent — I\'ll be in touch soon.', false);
          form.reset();
        } else {
          showToast('Something went wrong. Please try again.', true);
        }
      } catch (err) {
        showToast('Network error. Please try again.', true);
      }

      submitBtn.textContent = 'Send Message →';
      submitBtn.disabled = false;
    });

    function showToast(msg, isError) {
      status.textContent = msg;
      status.className   = 'form-toast' + (isError ? ' form-toast--error' : '');
      status.classList.add('form-toast--visible');
      setTimeout(() => {
        status.classList.add('form-toast--fade');
        setTimeout(() => {
          status.className = 'form-toast';
          status.textContent = '';
        }, 600);
      }, 3000);
    }
  </script>
</body>
</html>
